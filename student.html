<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>股市模擬 — 學生</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: #0f1117;
  color: #e8ecf4;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  max-width: 520px;
  margin: 0 auto;
}
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3347;
  --text:#e8ecf4; --muted:#7a82a0;
  --green:#34d58a; --red:#f0614e; --gold:#f0b942; --blue:#5b9cf6; --accent:#3d5cf5;
}
.mono { font-family:'DM Mono',monospace; }
.up { color:var(--green); }
.dn { color:var(--red); }

/* ══ 共用 screen 控制 ══ */
.screen { display: none; flex-direction: column; flex: 1; min-height: 0; }
.screen.visible { display: flex; }

/* ══ 登入畫面 ══ */
#screen-login {
  align-items: center;
  justify-content: center;
  padding: 40px 28px;
  text-align: center;
  min-height: 100%;
}
.login-emoji { font-size: 56px; line-height: 1; margin-bottom: 20px; }
.login-title { font-size: 28px; font-weight: 700; color: var(--gold); margin-bottom: 10px; }
.login-sub   { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 36px; max-width: 280px; }
.login-box   { width: 100%; max-width: 340px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
.login-input {
  width: 100%; display: block;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; color: var(--text);
  font-size: 17px; font-family: 'Noto Sans TC', sans-serif;
  text-align: center; outline: none; margin-bottom: 10px;
  transition: border-color .15s;
}
.login-input:focus { border-color: var(--accent); }
.login-input.shake { animation: shake .35s ease; }
.login-btn {
  width: 100%; background: var(--accent); border: none;
  border-radius: 10px; padding: 15px; color: #fff;
  font-size: 16px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif; transition: background .15s;
}
.login-btn:hover:not(:disabled) { background: #5068ff; }
.login-btn:disabled { opacity: .6; cursor: default; }
.login-error { font-size: 12px; color: var(--red); text-align: center; margin-bottom: 8px; display: none; }

/* ══ 遊戲畫面 ══ */
#screen-game { overflow: hidden; }

.topbar {
  flex-shrink: 0; display: flex; align-items: center;
  justify-content: space-between; padding: 10px 16px;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.topbar-left  { display: flex; align-items: center; gap: 10px; }
.topbar-name  { font-weight: 700; color: var(--gold); font-size: 14px; }
.topbar-round { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
.topbar-right { display: flex; align-items: center; gap: 8px; }

.phase-pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; font-family: 'DM Mono', monospace; }
.phase-waiting  { background: rgba(52,213,138,.1);  color: var(--green); border: 1px solid rgba(52,213,138,.3); }
.phase-ordering { background: rgba(240,185,66,.1);  color: var(--gold);  border: 1px solid rgba(240,185,66,.3); }
.phase-settled  { background: rgba(91,156,246,.1);  color: var(--blue);  border: 1px solid rgba(91,156,246,.3); }
.phase-ended    { background: rgba(240,97,78,.1);   color: var(--red);   border: 1px solid rgba(240,97,78,.3);  }

.btn-sm { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; color: var(--muted); font-size: 11px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }

.tab-scroll { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.tab-panel  { display: none; padding: 14px 14px 80px; }
.tab-panel.active { display: block; }

.sec-title {
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .1em; font-family: 'DM Mono', monospace;
  display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
}
.sec-title::before { content: ''; display: inline-block; width: 3px; height: 11px; background: var(--gold); border-radius: 2px; }

/* 倒數計時 */
.timer-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
.timer-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.timer-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; font-family: 'DM Mono', monospace; }
.timer-num   { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 700; color: var(--green); letter-spacing: .05em; }
.timer-bar-bg   { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.timer-bar-fill { height: 6px; border-radius: 3px; background: var(--green); transition: width .5s linear, background .5s; }

/* 新聞 */
.news-card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--gold); border-radius: 12px; padding: 20px 18px; margin-bottom: 14px; }
.news-label { font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: .1em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 10px; }
.news-title { font-size: 19px; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 10px; }
.news-body  { font-size: 14px; color: var(--muted); line-height: 1.8; }

/* 股價卡 */
.price-grid { display: flex; flex-direction: column; gap: 8px; }
.price-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; display: grid;
  grid-template-columns: auto 1fr auto;
  grid-template-rows: auto auto;
  gap: 2px 12px; align-items: center;
}
.pc-left     { grid-column: 1; grid-row: 1/3; display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 48px; }
.pc-id       { font-size: 12px; font-weight: 700; font-family: 'DM Mono', monospace; background: var(--surface2); padding: 3px 8px; border-radius: 5px; display: inline-block; }
.pc-industry { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 3px; background: var(--surface2); white-space: nowrap; }
.pc-middle   { grid-column: 2; grid-row: 1; }
.pc-name     { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.3; }
.pc-desc     { grid-column: 2; grid-row: 2; font-size: 11px; color: var(--muted); line-height: 1.4; margin-top: 2px; }
.pc-right    { grid-column: 3; grid-row: 1/3; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.pc-price    { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1; }
.pc-chg      { font-size: 12px; font-weight: 600; }
.pc-hold     { font-size: 11px; color: var(--muted); white-space: nowrap; }

/* 資產 */
.asset-hero  { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px 20px; text-align: center; margin-bottom: 14px; }
.asset-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-family: 'DM Mono', monospace; margin-bottom: 6px; }
.asset-total { font-size: 38px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1; margin-bottom: 4px; }
.asset-pct   { font-size: 15px; font-weight: 600; }
.asset-table { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.asset-row   { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-bottom: 1px solid var(--border); }
.asset-row:last-child { border-bottom: none; }
.asset-row.total-row  { background: var(--surface2); }
.asset-row-left { display: flex; align-items: center; gap: 10px; }
.asset-dot      { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.asset-row-name { font-size: 13px; font-weight: 500; }
.asset-row-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
.asset-row-val  { font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace; }

/* 交易 */
.phase-msg  { display: flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; font-size: 13px; color: var(--muted); margin-bottom: 12px; min-height: 80px; }
.order-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.order-head { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; margin-bottom: 12px; }
.order-sid  { font-size: 12px; font-weight: 700; font-family: 'DM Mono', monospace; background: var(--surface2); padding: 2px 8px; border-radius: 4px; }
.order-price { font-size: 12px; color: var(--muted); margin-left: auto; font-family: 'DM Mono', monospace; }
.order-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.order-col label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; font-family: 'DM Mono', monospace; margin-bottom: 5px; }
.order-col.buy  label { color: var(--green); }
.order-col.sell label { color: var(--red); }
.order-col input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px; color: var(--text); font-size: 16px; font-family: 'DM Mono', monospace; text-align: center; outline: none; transition: border-color .15s; }
.order-col.buy  input:focus { border-color: var(--green); }
.order-col.sell input:focus { border-color: var(--red); }
.preview-bar { text-align: center; font-size: 12px; font-weight: 500; padding: 8px; background: var(--surface2); border-radius: 8px; margin-bottom: 10px; font-family: 'DM Mono', monospace; }
.submit-row  { display: flex; gap: 8px; }
.btn-submit  { flex: 1; background: var(--accent); border: none; border-radius: 10px; padding: 14px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: background .15s; }
.btn-submit:hover:not(:disabled) { background: #5068ff; }
.btn-submit:disabled { opacity: .35; cursor: default; }
.btn-clear  { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; color: var(--muted); font-size: 14px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }

/* 排行榜 */
.lb-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; margin-bottom: 6px; background: var(--surface); border: 1px solid var(--border); }
.lb-row.me { border-color: var(--accent); background: rgba(61,92,245,.08); }
.lb-row.up .lb-val, .lb-row.up .lb-pct { color: var(--green); }
.lb-row.dn .lb-val, .lb-row.dn .lb-pct { color: var(--red); }
.lb-rank { font-size: 18px; min-width: 28px; }
.lb-name { flex: 1; font-size: 13px; font-weight: 500; }
.lb-val  { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; }
.lb-pct  { font-size: 12px; min-width: 52px; text-align: right; font-weight: 600; }

/* 底部導航 */
.bottom-nav { flex-shrink: 0; display: flex; background: var(--surface); border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom, 0px); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 9px 0; gap: 3px; border: none; background: none; color: var(--muted); font-size: 10px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; transition: color .15s; min-height: 56px; }
.nav-btn.active, .nav-btn:hover { color: var(--gold); }
.nav-icon { font-size: 20px; line-height: 1; }

/* ══ 結束畫面 ══ */
#screen-ended { overflow-y: auto; background: var(--bg); }
.ended-hero { background: linear-gradient(160deg,#1a1d27 0%,#0f1117 100%); border-bottom: 1px solid var(--border); padding: 36px 24px 28px; text-align: center; }
.ended-emoji { font-size: 56px; line-height: 1; margin-bottom: 14px; }
.ended-title { font-size: 26px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
.ended-sub   { font-size: 13px; color: var(--muted); line-height: 1.6; }
.ended-body  { padding: 16px 16px 60px; }
.final-my-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 22px 18px; margin-bottom: 16px;
  text-align: center; position: relative; overflow: hidden;
}
.final-my-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg,var(--gold),var(--accent)); }
.final-my-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
.final-my-name  { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
.final-my-total { font-size: 40px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1; margin-bottom: 4px; }
.final-my-pct   { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
.final-rank-badge { display: inline-block; font-size: 14px; font-weight: 700; padding: 6px 20px; border-radius: 20px; background: rgba(240,185,66,.12); color: var(--gold); border: 1px solid rgba(240,185,66,.3); font-family: 'DM Mono', monospace; }
.final-lb-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; font-family: 'DM Mono', monospace; display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.final-lb-title::before { content: ''; display: inline-block; width: 3px; height: 11px; background: var(--gold); border-radius: 2px; }
.final-lb-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 10px; margin-bottom: 6px; background: var(--surface); border: 1px solid var(--border); }
.final-lb-row.me   { border-color: var(--accent); background: rgba(61,92,245,.08); }
.final-lb-row.gold { border-color: rgba(240,185,66,.5); background: rgba(240,185,66,.05); }
.final-lb-rank  { font-size: 22px; min-width: 36px; text-align: center; }
.final-lb-name  { flex: 1; font-size: 14px; font-weight: 500; }
.final-lb-right { text-align: right; }
.final-lb-total { font-size: 15px; font-weight: 700; font-family: 'DM Mono', monospace; }
.final-lb-pct   { font-size: 12px; font-weight: 600; }

/* 其他 */
.empty-state { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; }
#toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-12px); background: var(--accent); color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; transition: all .25s; pointer-events: none; z-index: 999; white-space: nowrap; max-width: 90vw; text-align: center; }
#toast.show       { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.show.error { background: var(--red); }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
</style>
</head>
<body>

<!-- ══ 登入畫面 ══ -->
<div id="screen-login" class="screen">
  <div class="login-emoji">📈</div>
  <div class="login-title">股市模擬交易</div>
  <div class="login-sub">輸入你的名字，加入這場股市體驗。<br>同一名字可在不同裝置繼續使用。</div>
  <div class="login-box">
    <input type="text" id="input-name" class="login-input" placeholder="輸入你的名字…" maxlength="10" autocomplete="off">
    <div id="pw-wrap" style="display:none">
      <input type="password" id="input-pw" class="login-input" placeholder="輸入遊戲密碼…" autocomplete="off">
      <div id="login-error" class="login-error">❌ 密碼錯誤，請再試一次</div>
    </div>
    <button id="btn-login" class="login-btn">進入市場</button>
  </div>
</div>

<!-- ══ 遊戲畫面 ══ -->
<div id="screen-game" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-name"  id="topbar-name">—</div>
      <div class="topbar-round" id="topbar-round">—</div>
    </div>
    <div class="topbar-right">
      <span class="phase-pill phase-waiting" id="topbar-phase">等待中</span>
      <button class="btn-sm" id="btn-logout">登出</button>
    </div>
  </div>

  <div class="tab-scroll">
    <!-- 大盤 -->
    <div class="tab-panel active" id="tab-market">
      <div id="timer-box" style="display:none" class="timer-box">
        <div class="timer-row">
          <span class="timer-label" id="timer-label">⏱ 下單倒數</span>
          <span class="timer-num"   id="timer-num">00:00</span>
        </div>
        <div class="timer-bar-bg"><div class="timer-bar-fill" id="timer-fill"></div></div>
      </div>
      <div class="news-card">
        <div class="news-label">📡 市場新聞</div>
        <div class="news-title" id="news-title">等待老師發布新聞…</div>
        <div class="news-body"  id="news-body"></div>
      </div>
      <div class="sec-title">即時股價</div>
      <div class="price-grid" id="price-grid"></div>
    </div>

    <!-- 資產 -->
    <div class="tab-panel" id="tab-asset">
      <div class="asset-hero">
        <div class="asset-label">總資產</div>
        <div class="asset-total" id="asset-total">$—</div>
        <div class="asset-pct"   id="asset-pct">—</div>
      </div>
      <div class="sec-title">資產明細</div>
      <div class="asset-table" id="asset-table"><div class="empty-state">載入中…</div></div>
    </div>

    <!-- 交易 -->
    <div class="tab-panel" id="tab-trade">
      <div class="phase-msg" id="phase-msg">等待老師開始收單…</div>
      <div id="order-section" style="display:none">
        <div id="order-cards"></div>
        <div class="preview-bar" id="preview-bar">下單後現金：—</div>
        <div class="submit-row">
          <button class="btn-submit" id="btn-submit">送出訂單</button>
          <button class="btn-clear"  id="btn-clear">清除</button>
        </div>
      </div>
    </div>

    <!-- 排行榜 -->
    <div class="tab-panel" id="tab-rank">
      <div class="sec-title">全班財富排行</div>
      <div id="leaderboard"><div class="empty-state">尚無資料</div></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="market"><span class="nav-icon">📊</span>大盤</button>
    <button class="nav-btn"        data-tab="asset" ><span class="nav-icon">💼</span>資產</button>
    <button class="nav-btn"        data-tab="trade" ><span class="nav-icon">💱</span>交易</button>
    <button class="nav-btn"        data-tab="rank"  ><span class="nav-icon">🏆</span>排行</button>
  </nav>
</div>

<!-- ══ 結束畫面 ══ -->
<div id="screen-ended" class="screen">
  <div class="ended-hero">
    <div class="ended-emoji">🏆</div>
    <div class="ended-title">遊戲結束！</div>
    <div class="ended-sub">感謝你的參與 🎉<br>以下是你這場的最終成績</div>
  </div>
  <div class="ended-body">
    <div class="final-my-card">
      <div class="final-my-label">💼 我的最終成績</div>
      <div class="final-my-name"  id="ended-name">—</div>
      <div class="final-my-total" id="ended-total">$—</div>
      <div class="final-my-pct"   id="ended-pct">—</div>
      <div style="margin:12px 0"><div class="final-rank-badge" id="ended-rank">排名 —</div></div>
      <div id="ended-detail" style="margin-top:12px;background:var(--surface2);border-radius:8px;padding:10px 14px;text-align:left;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;line-height:2"></div>
    </div>
    <div class="final-lb-title">🏅 最終排行榜</div>
    <div id="final-lb"><div class="empty-state">載入中…</div></div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyBtuk86ocJRhgIWSsFqqsV7il1YcoTAs7Y",
  authDomain:        "stock-simulation-educademy.firebaseapp.com",
  databaseURL:       "https://stock-simulation-educademy-default-rtdb.firebaseio.com",
  projectId:         "stock-simulation-educademy",
  storageBucket:     "stock-simulation-educademy.firebasestorage.app",
  messagingSenderId: "345388631283",
  appId:             "1:345388631283:web:b0009591fa253de7252386",
  measurementId:     "G-X5D3NFVFYS"
};

const INIT_CASH = 10000;
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── 狀態 ─────────────────────────────────────────
let uid         = localStorage.getItem("stock_uid")   || "";
let myName      = localStorage.getItem("stock_name")  || "";
let gameState   = null;
let myData      = null;
let allPlayers  = {};
let stockConfig = [];
let submitted   = false;
let gamePassword = "";
let timerInt    = null;
let pwShown     = false;

// ── 畫面控制 ──────────────────────────────────────
function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("visible"));
  document.getElementById(id).classList.add("visible");
}

// ── 啟動 ─────────────────────────────────────────
async function boot() {
  try {
    // 載入股票設定
    const sSnap = await get(ref(db, "config/stocks"));
    stockConfig = sSnap.exists() ? sSnap.val() : defaultStocks();

    // 載入遊戲密碼
    try {
      const pwSnap = await get(ref(db, "config/gamePassword"));
      gamePassword = (pwSnap.exists() && pwSnap.val()) ? pwSnap.val() : "";
    } catch(e) { gamePassword = ""; }

    if (uid && myName) {
      // 已有登入資訊，直接進入
      const snap = await get(ref(db, `players/${uid}`));
      if (snap.exists()) {
        document.getElementById("topbar-name").textContent = myName;
        show("screen-game");
        startListening();
      } else {
        // 資料不存在（可能被老師刪除），重新登入
        clearLogin();
        show("screen-login");
      }
    } else {
      show("screen-login");
    }
  } catch(e) {
    console.error("boot error:", e);
    show("screen-login");
  }
}

function defaultStocks() {
  return [
    { id:"A", name:"新星科技", initPrice:100, supply:1000, color:"#f0b942", industry:"科技", desc:"專注於半導體與AI晶片研發，近年積極拓展海外市場。" },
    { id:"B", name:"綠能電力", initPrice:80,  supply:1200, color:"#34d58a", industry:"能源", desc:"台灣最大再生能源供應商，主力產品為太陽能與風力發電。" },
    { id:"C", name:"生醫創新", initPrice:120, supply:800,  color:"#5b9cf6", industry:"生技", desc:"新藥研發與醫療器材製造，多項藥品進入國際三期臨床試驗。" },
  ];
}

function clearLogin() {
  localStorage.removeItem("stock_uid");
  localStorage.removeItem("stock_name");
  uid = ""; myName = "";
}

// ── 登入 ──────────────────────────────────────────
document.getElementById("btn-login").addEventListener("click", doLogin);
document.getElementById("input-name").addEventListener("keydown", e => { if(e.key === "Enter") doLogin(); });
document.getElementById("input-pw").addEventListener("keydown",   e => { if(e.key === "Enter") doLogin(); });

async function doLogin() {
  const nameEl = document.getElementById("input-name");
  const pwEl   = document.getElementById("input-pw");
  const pwWrap = document.getElementById("pw-wrap");
  const errEl  = document.getElementById("login-error");
  const btn    = document.getElementById("btn-login");
  const name   = nameEl.value.trim();

  if (!name) {
    nameEl.classList.add("shake");
    setTimeout(() => nameEl.classList.remove("shake"), 400);
    return;
  }

  // 有密碼設定：先展開密碼欄位
  if (gamePassword && !pwShown) {
    pwWrap.style.display = "block";
    pwEl.focus();
    btn.textContent = "確認登入";
    pwShown = true;
    return;
  }

  // 有密碼設定：驗證密碼
  if (gamePassword && pwShown) {
    if (pwEl.value !== gamePassword) {
      errEl.style.display = "block";
      pwEl.value = "";
      pwEl.classList.add("shake");
      setTimeout(() => pwEl.classList.remove("shake"), 400);
      return;
    }
    errEl.style.display = "none";
  }

  // 登入
  btn.textContent = "登入中…";
  btn.disabled = true;

  try {
    uid    = "u_" + name.replace(/\s+/g, "_");
    myName = name;
    localStorage.setItem("stock_uid",  uid);
    localStorage.setItem("stock_name", myName);

    // 建立或更新玩家資料
    const snap = await get(ref(db, `players/${uid}`));
    if (!snap.exists()) {
      const stocks = Object.fromEntries(stockConfig.map(s => [s.id, 0]));
      await set(ref(db, `players/${uid}`), {
        name: myName, cash: INIT_CASH, stocks, total: INIT_CASH, joinedAt: Date.now()
      });
    } else {
      await update(ref(db, `players/${uid}`), { name: myName });
    }

    document.getElementById("topbar-name").textContent = myName;
    show("screen-game");
    startListening();
  } catch(e) {
    console.error("login error:", e);
    btn.textContent = gamePassword ? "確認登入" : "進入市場";
    btn.disabled = false;
    toast("登入失敗，請確認網路連線", "error");
  }
}

document.getElementById("btn-logout").addEventListener("click", () => {
  clearLogin();
  clearInterval(timerInt);
  location.reload();
});

// ── Firebase 監聽 ─────────────────────────────────
function startListening() {
  onValue(ref(db, "game"),           s => { gameState = s.val(); onGameChange(); });
  onValue(ref(db, `players/${uid}`), s => { myData = s.val(); renderAsset(); calcPreview(); });
  onValue(ref(db, "players"),        s => { allPlayers = s.val() || {}; renderLeaderboard(); renderFinalLb(); });
  onValue(ref(db, "config/stocks"),  s => { if(s.exists()) { stockConfig = s.val(); renderOrderCards(); } });
}

// ── 遊戲狀態變更 ──────────────────────────────────
function onGameChange() {
  if (!gameState) return;
  const phase = gameState.phase || "waiting";

  // 遊戲結束 → 切換到結束畫面
  if (phase === "ended") {
    show("screen-ended");
    renderFinalLb();
    return;
  }

  // 確保在遊戲畫面
  if (!document.getElementById("screen-game").classList.contains("visible")) {
    show("screen-game");
  }

  renderGame();
}

// ── 大盤渲染 ──────────────────────────────────────
function renderGame() {
  if (!gameState) return;
  const phase  = gameState.phase || "waiting";
  const round  = gameState.round || 0;
  const prices = gameState.prices || {};
  const news   = gameState.news   || {};

  document.getElementById("topbar-round").textContent = `第 ${round+1} 回合`;
  const ph = document.getElementById("topbar-phase");
  ph.textContent = { waiting:"等待中", ordering:"收單中", settled:"已結算", ended:"遊戲結束" }[phase] || phase;
  ph.className   = "phase-pill phase-" + phase;

  document.getElementById("news-title").textContent = news.title || "等待老師發布新聞…";
  document.getElementById("news-body").textContent  = news.body  || "";

  // 股價卡
  const hist = gameState.priceHistory || {};
  document.getElementById("price-grid").innerHTML = stockConfig.map(s => {
    const p    = prices[s.id] || s.initPrice;
    const prev = round > 0 ? (hist[round-1]?.[s.id] || s.initPrice) : s.initPrice;
    const chg  = ((p-prev)/prev*100).toFixed(1);
    const up   = p >= prev;
    const hold = myData?.stocks?.[s.id] || 0;
    return `<div class="price-card" style="border-left:4px solid ${s.color}">
      <div class="pc-left">
        <span class="pc-id" style="color:${s.color}">${s.id}</span>
        <span class="pc-industry" style="border:1px solid ${s.color}40;color:${s.color}">${s.industry||""}</span>
      </div>
      <div class="pc-middle"><div class="pc-name">${s.name}</div></div>
      <div class="pc-desc">${s.desc||""}</div>
      <div class="pc-right">
        <div class="pc-price ${up?"up":"dn"}">${p.toFixed(0)}</div>
        <div class="pc-chg   ${up?"up":"dn"}">${up?"▲":"▼"} ${Math.abs(chg)}%</div>
        <div class="pc-hold">持有 ${hold} 股</div>
      </div>
    </div>`;
  }).join("");

  // 下單區
  const canOrder = (phase === "ordering");
  document.getElementById("phase-msg").style.display     = canOrder ? "none" : "flex";
  document.getElementById("order-section").style.display = canOrder ? "block" : "none";
  document.getElementById("phase-msg").textContent = {
    waiting: "等待老師開始收單…",
    settled: "本回合已結算，等待下一回合",
  }[phase] || "";
  if (phase === "waiting") submitted = false;
  document.getElementById("btn-submit").disabled = submitted || !canOrder;

  // 倒數計時器
  const timerBox = document.getElementById("timer-box");
  if (phase === "ordering" && gameState.deadlineAt) {
    timerBox.style.display = "block";
    clearInterval(timerInt);
    if (gameState.timerPaused) {
      renderTimer(gameState.pausedSecsLeft || 0, true);
    } else {
      timerInt = setInterval(() => {
        const left = Math.max(0, Math.round((gameState.deadlineAt - Date.now()) / 1000));
        renderTimer(left, false);
        if (left <= 0) clearInterval(timerInt);
      }, 500);
    }
  } else {
    timerBox.style.display = "none";
    clearInterval(timerInt);
  }

  renderAsset();
}

function renderTimer(secs, paused) {
  const m = Math.floor(secs/60).toString().padStart(2,"0");
  const s = (secs%60).toString().padStart(2,"0");
  const numEl = document.getElementById("timer-num");
  const fill  = document.getElementById("timer-fill");
  const label = document.getElementById("timer-label");
  if (numEl) {
    numEl.textContent = `${m}:${s}`;
    numEl.style.color = paused ? "var(--muted)" : secs<=30 ? "var(--red)" : secs<=60 ? "var(--gold)" : "var(--green)";
  }
  if (label) label.textContent = paused ? "⏸ 計時暫停" : "⏱ 下單倒數";
  const total = gameState?.roundSeconds || 180;
  const pct   = total > 0 ? (secs/total*100) : 0;
  if (fill) {
    fill.style.width      = pct + "%";
    fill.style.background = secs<=30 ? "var(--red)" : secs<=60 ? "var(--gold)" : "var(--green)";
  }
}

// ── 資產 ─────────────────────────────────────────
function renderAsset() {
  if (!myData) return;
  const prices = gameState?.prices || {};
  let sv = 0;
  stockConfig.forEach(s => sv += (myData.stocks?.[s.id]||0) * (prices[s.id]||s.initPrice));
  const cash  = myData.cash || 0;
  const total = cash + sv;
  const pct   = ((total-INIT_CASH)/INIT_CASH*100).toFixed(1);
  const up    = total >= INIT_CASH;

  document.getElementById("asset-total").textContent = `$${total.toFixed(0)}`;
  const pe = document.getElementById("asset-pct");
  pe.textContent = `${up?"+":""}${pct}%`;
  pe.className   = "asset-pct " + (up?"up":"dn");

  const rows = stockConfig.map(s => {
    const qty   = myData.stocks?.[s.id] || 0;
    const price = prices[s.id] || s.initPrice;
    const val   = qty * price;
    return `<div class="asset-row">
      <div class="asset-row-left">
        <span class="asset-dot" style="background:${s.color}"></span>
        <div>
          <div class="asset-row-name">${s.name}</div>
          <div class="asset-row-sub">${qty} 股 × $${price.toFixed(0)}</div>
        </div>
      </div>
      <div class="asset-row-val ${qty>0?"":"dn"}">${qty>0?"$"+val.toFixed(0):"—"}</div>
    </div>`;
  }).join("");

  document.getElementById("asset-table").innerHTML = rows +
    `<div class="asset-row">
      <div class="asset-row-left">
        <span class="asset-dot" style="background:var(--muted)"></span>
        <div><div class="asset-row-name">現金</div><div class="asset-row-sub">可用資金</div></div>
      </div>
      <div class="asset-row-val up">$${cash.toFixed(0)}</div>
    </div>
    <div class="asset-row total-row">
      <div class="asset-row-name" style="font-weight:700">總資產</div>
      <div class="asset-row-val ${up?"up":"dn"}" style="font-size:16px;font-weight:700">$${total.toFixed(0)}</div>
    </div>`;
}

// ── 下單 ─────────────────────────────────────────
function renderOrderCards() {
  const prices = gameState?.prices || {};
  document.getElementById("order-cards").innerHTML = stockConfig.map(s => {
    const p = prices[s.id] || s.initPrice;
    return `<div class="order-card">
      <div class="order-head">
        <span class="order-sid" style="color:${s.color}">${s.id}</span>
        <span>${s.name}</span>
        <span class="order-price">$${p.toFixed(0)}</span>
      </div>
      <div class="order-inputs">
        <div class="order-col buy" ><label>買入（股）</label><input type="number" id="buy_${s.id}"  class="qty" min="0" placeholder="0"></div>
        <div class="order-col sell"><label>賣出（股）</label><input type="number" id="sell_${s.id}" class="qty" min="0" placeholder="0"></div>
      </div>
    </div>`;
  }).join("");
  document.querySelectorAll(".qty").forEach(el => el.addEventListener("input", calcPreview));
}

function calcPreview() {
  if (!myData || !gameState) return;
  const prices = gameState.prices || {};
  let cl = myData.cash || 0;
  stockConfig.forEach(s => {
    const b = parseInt(document.getElementById(`buy_${s.id}`)?.value  || 0) || 0;
    const v = parseInt(document.getElementById(`sell_${s.id}`)?.value || 0) || 0;
    cl += v*(prices[s.id]||s.initPrice) - b*(prices[s.id]||s.initPrice);
  });
  const bar = document.getElementById("preview-bar");
  if (bar) { bar.textContent = `下單後現金：$${Math.max(0,cl).toFixed(0)}`; bar.className = "preview-bar " + (cl>=0?"up":"dn"); }
}

document.getElementById("btn-submit").addEventListener("click", async () => {
  if (!gameState || gameState.phase !== "ordering") return;
  const prices = gameState.prices || {};
  const order  = { submittedAt: Date.now() };
  let cost = 0;
  stockConfig.forEach(s => {
    const b = parseInt(document.getElementById(`buy_${s.id}`)?.value  || 0) || 0;
    const v = parseInt(document.getElementById(`sell_${s.id}`)?.value || 0) || 0;
    order[`buy_${s.id}`] = b; order[`sell_${s.id}`] = v;
    cost += b * (prices[s.id] || s.initPrice);
  });
  if (cost > (myData?.cash||0)) { toast("現金不足！","error"); return; }
  await set(ref(db, `orders/${uid}`), order);
  submitted = true;
  document.getElementById("btn-submit").disabled = true;
  toast("訂單已送出！等待老師結算");
});

document.getElementById("btn-clear").addEventListener("click", () => {
  document.querySelectorAll(".qty").forEach(el => el.value = "");
  calcPreview();
});

// ── 排行榜 ───────────────────────────────────────
function renderLeaderboard() {
  const prices = gameState?.prices || {};
  const sorted = Object.entries(allPlayers).map(([id,p]) => {
    let t = p.cash||0; stockConfig.forEach(s => t += (p.stocks?.[s.id]||0)*(prices[s.id]||s.initPrice));
    return { name:p.name||id.slice(0,6), total:t, isMe:id===uid };
  }).sort((a,b)=>b.total-a.total);
  const medals = ["🥇","🥈","🥉"];
  document.getElementById("leaderboard").innerHTML = sorted.length
    ? sorted.map((p,i) => {
        const pct = ((p.total-INIT_CASH)/INIT_CASH*100).toFixed(1);
        return `<div class="lb-row ${p.isMe?"me":""} ${p.total>=INIT_CASH?"up":"dn"}">
          <span class="lb-rank">${medals[i]||i+1}</span>
          <span class="lb-name">${p.name}${p.isMe?" ✦":""}</span>
          <span class="lb-val">$${p.total.toFixed(0)}</span>
          <span class="lb-pct">${p.total>=INIT_CASH?"+":""}${pct}%</span>
        </div>`;
      }).join("")
    : `<div class="empty-state">尚無資料</div>`;
}

// ── 結束畫面 ─────────────────────────────────────
function renderFinalLb() {
  if (!document.getElementById("screen-ended").classList.contains("visible")) return;
  const prices = gameState?.prices || {};
  const sorted = Object.entries(allPlayers).map(([id,p]) => {
    let t = p.cash||0; stockConfig.forEach(s => t += (p.stocks?.[s.id]||0)*(prices[s.id]||s.initPrice));
    return { name:p.name||id.slice(0,6), total:t, isMe:id===uid, data:p };
  }).sort((a,b)=>b.total-a.total);

  const myIdx = sorted.findIndex(p=>p.isMe);
  const me    = sorted[myIdx];
  if (me) {
    const pct = ((me.total-INIT_CASH)/INIT_CASH*100).toFixed(1);
    const up  = me.total >= INIT_CASH;
    const rankEmoji = ["🥇","🥈","🥉"][myIdx] || `第 ${myIdx+1} 名`;
    document.getElementById("ended-name").textContent  = me.name;
    document.getElementById("ended-total").textContent = `$${me.total.toFixed(0)}`;
    document.getElementById("ended-total").className   = "final-my-total " + (up?"up":"dn");
    document.getElementById("ended-pct").textContent   = `${up?"+":""}${pct}%`;
    document.getElementById("ended-pct").className     = "final-my-pct " + (up?"up":"dn");
    document.getElementById("ended-rank").textContent  = `${rankEmoji}　共 ${sorted.length} 人`;
    // 明細
    const cash = me.data.cash || 0;
    const detail = stockConfig
      .map(s => { const qty=me.data.stocks?.[s.id]||0; const val=qty*(prices[s.id]||s.initPrice); return qty>0?`${s.name}：${qty} 股　$${val.toFixed(0)}`:null; })
      .filter(Boolean).join("<br>");
    document.getElementById("ended-detail").innerHTML = `現金：$${cash.toFixed(0)}${detail?"<br>"+detail:""}`;
  }

  const medals = ["🥇","🥈","🥉"];
  document.getElementById("final-lb").innerHTML = sorted.map((p,i) => {
    const pct = ((p.total-INIT_CASH)/INIT_CASH*100).toFixed(1);
    const up  = p.total >= INIT_CASH;
    return `<div class="final-lb-row ${p.isMe?"me":""} ${i===0?"gold":""}">
      <div class="final-lb-rank">${medals[i]||i+1}</div>
      <div class="final-lb-name">${p.name}${p.isMe?" ✦":""}${i===0?" 🎊":""}</div>
      <div class="final-lb-right">
        <div class="final-lb-total ${up?"up":"dn"}">$${p.total.toFixed(0)}</div>
        <div class="final-lb-pct   ${up?"up":"dn"}">${up?"+":""}${pct}%</div>
      </div>
    </div>`;
  }).join("");
}

// ── Tab 切換 ─────────────────────────────────────
document.querySelectorAll(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-"+tab).classList.add("active");
    btn.classList.add("active");
    if (tab === "trade") renderOrderCards();
  });
});

// ── Toast ─────────────────────────────────────────
function toast(msg, type="ok") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "show"+(type==="error"?" error":"");
  clearTimeout(t._t); t._t = setTimeout(()=>t.className="", 2800);
}

boot();
</script>
</body>
</html>
